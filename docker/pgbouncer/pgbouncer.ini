; Sprint 14 · PgBouncer configuration for 50-tenant stress test
; Sits between the API and PostgreSQL to cap active connections.
;
; Target: ≤ 80% pool utilisation at 50 concurrent tenants.
; PostgreSQL max_connections default = 100 → pool_size 60, reserve 20 for admin/migrations.

[databases]
patioer = host=postgres port=5432 dbname=patioer user=postgres password=postgres

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = trust

; Transaction-level pooling — connections returned after each transaction.
pool_mode = transaction

; 60 server connections max (leaves headroom for direct admin connections).
default_pool_size = 60
min_pool_size = 10
reserve_pool_size = 10
reserve_pool_timeout = 3

max_client_conn = 500
max_db_connections = 60

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; Stats collection for monitoring
stats_period = 30

; Timeouts
server_idle_timeout = 60
client_idle_timeout = 0
client_login_timeout = 15
query_timeout = 30
query_wait_timeout = 60

admin_users = postgres
