version: '3.9'

services:
  postgres:
    image: postgres:14
    container_name: patioer-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: patioer
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  paperclip:
    image: node:20-alpine
    container_name: patioer-paperclip
    working_dir: /workspace/paperclip
    command: sh -c "corepack enable && pnpm install && pnpm dev"
    volumes:
      - ./:/workspace
    ports:
      - '3000:3000'
    depends_on:
      - postgres

  api:
    image: node:20-alpine
    container_name: patioer-api
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @patioer/api dev"
    volumes:
      - ./:/workspace
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/patioer
      PORT: "3100"
      PAPERCLIP_API_URL: http://paperclip:3000
    ports:
      - '3100:3100'
    depends_on:
      - postgres
      - paperclip

volumes:
  postgres_data:
