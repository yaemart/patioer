[services.electroos-api]
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @patioer/api build"
startCommand = "node apps/api/dist/server.js"

[services.electroos-api.deploy]
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30

[services.dataos-api]
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @patioer/dataos-api build"
startCommand = "node apps/dataos-api/dist/server.js"

[services.dataos-api.deploy]
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
