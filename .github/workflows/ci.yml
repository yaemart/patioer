name: CI

on:
  workflow_dispatch: # allow manual re-runs without pushing a commit

  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

# Cancel any in-progress run for the same branch/PR so stale runs don't waste
# runner minutes or block merges.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: this workflow only needs to read code.
permissions:
  contents: read

# Security and reproducibility: pin third-party actions to immutable commit SHAs.
# Keep these SHAs updated periodically (e.g. monthly) via a dedicated maintenance PR.
# Node.js runtime versions: checkout v6, setup-node v6 use Node.js 24 (v4 used Node.js 20).
jobs:
  workflow-lint:
    name: Lint workflow files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate GitHub Actions workflows
        uses: reviewdog/action-actionlint@0d952c597ef8459f634d7145b0b044a9699e5e43 # v1.71.0

  build-check:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Version comes from root package.json "packageManager" (single source of truth).
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
        env:
          VITEST_REPORTER: github-actions

      - name: Agent seed script tests (Task 4.9)
        run: pnpm test:scripts
        env:
          VITEST_REPORTER: github-actions

      - name: Coverage check (market)
        run: pnpm --filter @patioer/market test:coverage
        env:
          VITEST_REPORTER: github-actions

      - name: Coverage check (devos-bridge)
        run: pnpm --filter @patioer/devos-bridge test:coverage
        env:
          VITEST_REPORTER: github-actions

      - name: Coverage check (harness)
        run: pnpm --filter @patioer/harness test:coverage
        env:
          VITEST_REPORTER: github-actions

      - name: Coverage check (api)
        run: pnpm --filter api test:coverage
        env:
          VITEST_REPORTER: github-actions

      - name: Coverage check (dataos)
        run: pnpm --filter @patioer/dataos test:coverage
        env:
          VITEST_REPORTER: github-actions

      - name: Coverage check (dataos-client)
        run: pnpm --filter @patioer/dataos-client test:coverage
        env:
          VITEST_REPORTER: github-actions

      - name: Coverage check (dataos-api)
        run: pnpm --filter @patioer/dataos-api test:coverage
        env:
          VITEST_REPORTER: github-actions

  integration-isolation:
    name: Integration · Tenant isolation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: patioer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d patioer"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL_ADMIN: postgres://postgres:postgres@localhost:5432/patioer
      TEST_DATABASE_URL: postgres://patioer_ci:patioer_ci@localhost:5432/patioer
      REDIS_URL: redis://localhost:6379
      VITEST_REPORTER: github-actions
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Push schema
        run: DATABASE_URL="$DATABASE_URL_ADMIN" pnpm --filter @patioer/db db:push

      - name: Apply RLS policies
        run: DATABASE_URL="$DATABASE_URL_ADMIN" pnpm exec tsx ./scripts/apply-rls.ts

      - name: Ensure non-super test role
        run: DATABASE_URL="$DATABASE_URL_ADMIN" TEST_DATABASE_URL="$TEST_DATABASE_URL" pnpm exec tsx ./scripts/ensure-db-test-role.ts

      - name: DB integration isolation
        run: DATABASE_URL="$TEST_DATABASE_URL" pnpm --filter @patioer/db test -- rls-all-tables.integration.test.ts

      - name: API integration isolation
        run: DATABASE_URL="$TEST_DATABASE_URL" REDIS_URL="$REDIS_URL" pnpm --filter @patioer/api test -- e2e-tenant-isolation.integration.test.ts

  integration-concurrency:
    name: Integration · 10-tenant concurrency
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: patioer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d patioer"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL_ADMIN: postgres://postgres:postgres@localhost:5432/patioer
      TEST_DATABASE_URL: postgres://patioer_ci:patioer_ci@localhost:5432/patioer
      REDIS_URL: redis://localhost:6379
      VITEST_REPORTER: github-actions
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Push schema
        run: DATABASE_URL="$DATABASE_URL_ADMIN" pnpm --filter @patioer/db db:push

      - name: Apply RLS policies
        run: DATABASE_URL="$DATABASE_URL_ADMIN" pnpm exec tsx ./scripts/apply-rls.ts

      - name: Ensure non-super test role
        run: DATABASE_URL="$DATABASE_URL_ADMIN" TEST_DATABASE_URL="$TEST_DATABASE_URL" pnpm exec tsx ./scripts/ensure-db-test-role.ts

      - name: API integration concurrency
        run: DATABASE_URL="$TEST_DATABASE_URL" REDIS_URL="$REDIS_URL" pnpm --filter @patioer/api test -- e2e-tenant-concurrency.integration.test.ts

  integration-rate-limit:
    name: Integration · Amazon 429 retry
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Harness 429 retry test
        run: pnpm --filter @patioer/harness test -- amazon.harness.test.ts
        env:
          VITEST_REPORTER: github-actions
