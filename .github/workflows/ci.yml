name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel any in-progress run for the same branch/PR so stale runs don't waste
# runner minutes or block merges.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: this workflow only needs to read code.
permissions:
  contents: read

# Security and reproducibility: pin third-party actions to immutable commit SHAs.
# Keep these SHAs updated periodically (e.g. monthly) via a dedicated maintenance PR.
jobs:
  workflow-lint:
    name: Lint workflow files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Validate GitHub Actions workflows
        uses: reviewdog/action-actionlint@0d952c597ef8459f634d7145b0b044a9699e5e43

  build-check:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # Version comes from root package.json "packageManager" (single source of truth).
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
