name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel any in-progress run for the same branch/PR so stale runs don't waste
# runner minutes or block merges.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: this workflow only needs to read code.
permissions:
  contents: read

jobs:
  workflow-lint:
    name: Lint workflow files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate GitHub Actions workflows
        uses: reviewdog/action-actionlint@v1

  build-check:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
